<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape & Shine — Digital Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --font-h: 'Unbounded', sans-serif;
      --font-b: 'Plus Jakarta Sans', sans-serif;
      --white:  #f5f0eb;
      --black:  #0d0d0d;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-b);
      background: #1a1a1a;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.18) 0%,
        rgba(0,0,0,.0)  35%,
        rgba(0,0,0,.35) 100%
      );
    }

    .navbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
    }

    .nav-logo {
      font-family: var(--font-h);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .5px;
      color: var(--white);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 999px;
      padding: 12px 32px;
      list-style: none;
    }
    .nav-links li + li { margin-left: 32px; }
    .nav-links a {
      text-decoration: none;
      color: var(--white);
      font-family: var(--font-b);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .2px;
      transition: opacity .18s;
    }
    .nav-links a:hover { opacity: .65; }

    .nav-subscribe {
      background: var(--white);
      color: var(--black);
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-family: var(--font-b);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: .2px;
      transition: opacity .18s, transform .15s;
    }
    .nav-subscribe:hover { opacity: .85; transform: translateY(-1px); }

    .hero-text {
      position: relative;
      z-index: 10;
      margin-top: auto;
      padding: 0 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-text h1 {
      font-family: var(--font-h);
      font-size: clamp(56px, 10vw, 140px);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -4px;
      color: var(--white);
      text-transform: uppercase;
    }

    .hero-text .sub {
      margin-top: 32px;          
      font-family: var(--font-b);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: .8px;
      color: rgba(245,240,235,.85);
      text-transform: lowercase;
    }

    @media (max-width: 640px) {
      .navbar { padding: 20px 20px; }
      .nav-logo { display: none; }
      .nav-links { padding: 10px 20px; }
      .nav-links li + li { margin-left: 20px; }
      .hero-text { padding: 0 20px 40px; }
      .hero-text h1 { letter-spacing: -2px; }
    }
  </style>
</head>
<body>

<section class="hero">

  <div class="hero-bg">
    <img
      src="virgostudio-skincare-10110207_1920.jpg"
      alt="Skincare"
    />
  </div>

  <nav class="navbar">
    <span class="nav-logo">S&S</span>

    <ul class="nav-links">
      <li><a href="#about">about</a></li>
      <li><a href="#catalog">catalog</a></li>
    </ul>

    <button class="nav-subscribe">Subscribe</button>
  </nav>

  <div class="hero-text">
    <h1>Shape &amp; Shine</h1>
    <p class="sub">your digital journal</p>
  </div>

</section>

</body>
</html>
